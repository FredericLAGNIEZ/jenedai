---
name: Jenedai
prefect-version: 3.6.23
 
build: null
push: null
 
pull:
- prefect.deployments.steps.git_clone:
    id: clone-step
    repository: https://github.com/Jenedai/jenedai
    branch: mlops_frederic
- prefect.deployments.steps.run_shell_script:
    script: pip install uv
    directory: "{{ clone-step.directory }}"
- prefect.deployments.steps.run_shell_script:
    script: uv pip install --python /usr/local/bin/python3.12 --no-build-isolation -e .
    directory: "{{ clone-step.directory }}"
- prefect.deployments.steps.run_shell_script:
    script: python -c "import sys; print(sys.path); import os; print(os.environ.get('PYTHONPATH', 'NOT SET'))"
    directory: "{{ clone-step.directory }}"
    
deployments:
- name: consume-energy
  version: null
  tags: []
  concurrency_limit: null
  description: ETL pipeline for energy consumption data.
  entrypoint: src/jenedai/ml/scripts/prefect_flow.py:etl
  parameters: {}
  work_pool:
    name: energy-pool
    work_queue_name: null
    job_variables: {}
    env:
        PYTHONPATH: /opt/prefect/jenedai-mlops_frederic/src
  schedules:
  - cron: '*/1 * * * *'
    timezone: UTC
    day_or: true
    active: true
